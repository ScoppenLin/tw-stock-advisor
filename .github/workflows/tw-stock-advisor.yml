name: TW Stock Advisor

on:
  workflow_dispatch:
  schedule:
    # 07:30 Asia/Taipei, Monday-Friday. GitHub cron uses UTC.
    - cron: "30 23 * * 0-4"

permissions:
  contents: read

concurrency:
  group: tw-stock-advisor
  cancel-in-progress: false

jobs:
  run-advisor:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tw_stock_advisor

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: tw_stock_advisor/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run advisor
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_B64 }}
        run: |
          if [ -z "$GOOGLE_SHEET_ID" ]; then
            echo "::error::GOOGLE_SHEET_ID secret is required to update Google Sheets."
            exit 1
          fi
          if [ -z "$GOOGLE_SERVICE_ACCOUNT_JSON_B64" ] && [ -z "$GOOGLE_SERVICE_ACCOUNT_JSON" ]; then
            echo "::error::Set either GOOGLE_SERVICE_ACCOUNT_JSON_B64 or GOOGLE_SERVICE_ACCOUNT_JSON secret."
            exit 1
          fi
          python src/main.py --mode all --data-source twse --input-source google --output-sink google

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: tw-stock-advisor-reports
          path: |
            tw_stock_advisor/reports/daily/*.csv
            tw_stock_advisor/reports/daily/*.md
            tw_stock_advisor/reports/weekly/*.csv
            tw_stock_advisor/reports/weekly/*.md
          if-no-files-found: error

      - name: Email reports
        env:
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USERNAME: ${{ secrets.MAIL_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          EMAIL_FROM: ${{ secrets.MAIL_USERNAME }}
          EMAIL_TO: scoppen.lin@gmail.com
          EMAIL_SUBJECT: 台股投資建議報告
        run: |
          if [ -n "$SMTP_USERNAME" ] && [ -n "$SMTP_PASSWORD" ]; then
            python src/email_report.py
          else
            echo "::warning::MAIL_USERNAME or MAIL_PASSWORD secret is missing; skipping email delivery."
          fi
