name: TW Stock Advisor

on:
  workflow_dispatch:
  schedule:
    # 07:30 Asia/Taipei, Monday-Friday. GitHub cron uses UTC.
    - cron: "30 23 * * 0-4"

permissions:
  contents: read

concurrency:
  group: tw-stock-advisor
  cancel-in-progress: false

jobs:
  run-advisor:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tw_stock_advisor

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: tw_stock_advisor/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run advisor
        env:
          PYTHONDONTWRITEBYTECODE: "1"
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_B64 }}
        run: |
          if [ -n "$GOOGLE_SHEET_ID" ] && [ -n "$GOOGLE_SERVICE_ACCOUNT_JSON_B64" ]; then
            python src/main.py --mode all --data-source twse --input-source google --output-sink google
          else
            python src/main.py --mode all --data-source twse
          fi

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: tw-stock-advisor-reports
          path: |
            tw_stock_advisor/reports/daily/*.csv
            tw_stock_advisor/reports/daily/*.md
            tw_stock_advisor/reports/weekly/*.csv
            tw_stock_advisor/reports/weekly/*.md
          if-no-files-found: error
